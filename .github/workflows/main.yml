name: Bot7 Debug Runner

on:
  workflow_dispatch:   # فقط دستی اجرا بشه
  # می‌تونی push روی یه شاخه‌ی خاص هم اضافه کنی ولی من غیرفعال می‌ذارم

jobs:
  run-bot7:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # برای تست کوتاه

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies (as Bot7 needed)
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright beautifulsoup4
          # yt-dlp و ffmpeg در Bot7 استفاده می‌شه ولی اختیاری؛ اینجا نصبشون می‌کنیم تا کامل لاگ ببینیم
          pip install yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg   # فقط برای Bot7

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Run Bot7.py
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          # فرض می‌کنیم فایل Bot7.py (همونی که فرستادی) در ریشه‌ی مخزن هست
          python bot.py

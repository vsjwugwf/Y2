name: Bale Bot Runner

on:
  workflow_dispatch:   # اجرای دستی از تب Actions
  push:
    branches:
      - main
    paths:
      - "bot.py"
      - ".github/workflows/bot.yml"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # حدود ۵ ساعت و ۵۵ دقیقه

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies for Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libdbus-1-3 \
            libxkbcommon0 \
            libxcomposite1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libasound2 \
            libatspi2.0-0 \
            libxdamage1 \
            libxfixes3 \
            libx11-xcb1 \
            libx11-6 \
            libxext6 \
            libxrender1 \
            libxtst6 \
            fonts-liberation \
            libappindicator3-1 \
            libxss1 \
            lsb-release \
            xdg-utils \
            libu2f-udev \
            libvulkan1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright beautifulsoup4

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run bot
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          echo "Starting bot..."
          python bot.py

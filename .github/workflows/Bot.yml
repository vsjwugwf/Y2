name: Bale Bot Final v9

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright beautifulsoup4 yt-dlp

      # تغییر مهم: نصب وابستگی‌های سیستمی مرورگر
      - name: Install Playwright Chromium & Dependencies
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Debug token length
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          echo "Token length: ${#BALE_BOT_TOKEN}"

      - name: Run bot
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          python bot.py
          

name: Bale Bot Runner (5h55m runtime, 6h cycle)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies for Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk-bridge2.0-0 libatk1.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright beautifulsoup4

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium --with-deps

      - name: Run bot (auto-exit after 355 min)
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          python bot.py 2>&1 | tee bot.log
          exit ${PIPESTATUS[0]}

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-log
          path: bot.log

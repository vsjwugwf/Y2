name: Bale Bot v12 Ultimate

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Dependencies (FFmpeg & Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright beautifulsoup4 yt-dlp playwright-stealth

      - name: Install Playwright Chromium with dependencies
        run: |
          # استفاده از --with-deps باعث میشه کتابخانه‌های سیستمی پیش‌نیاز مرورگر هم نصب بشن
          python -m playwright install --with-deps chromium

      - name: Run bot with Virtual Display (Xvfb)
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          # اجرای ربات در یک مانیتور مجازی با رزولوشن 1280 در 720
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" python B2.py


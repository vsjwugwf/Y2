name: K (5h55m runtime, 6h cycle)

on:
  schedule:
    # هر ۶ ساعت یکبار (UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:   # دستی هم قابل اجراست
  push:
    branches: [ "main" ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # 5 ساعت و 55 دقیقه

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright beautifulsoup4

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium

      - name: Run bot (auto-exit after 355 min)
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          python bot.py
